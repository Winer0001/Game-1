<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>B-Coin Tycoon 2.0</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --acc: #ff9800; --bg: #0a0a0a; --card: #161616; --txt: #e0e0e0; }
        body { background: var(--bg); color: var(--txt); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; user-select: none; touch-action: manipulation; transition: 0.5s; }
        .card { background: var(--card); border: 1px solid #333; border-radius: 16px; padding: 12px; margin-bottom: 8px; }
        #balance { font-size: 2.5rem; color: var(--acc); font-weight: 800; text-align: center; margin: 5px 0; text-shadow: 0 0 15px rgba(255,152,0,0.3); }
        .stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 0.7rem; text-transform: uppercase; font-weight: bold; }
        .bar-container { width: 100%; height: 6px; background: #222; border-radius: 3px; margin-top: 4px; overflow: hidden; }
        .bar-fill { height: 100%; width: 100%; transition: 0.3s; }
        
        .main-btn-area { height: 180px; display: flex; align-items: center; justify-content: center; position: relative; cursor: pointer; }
        #target { font-size: 7rem; transition: 0.1s; z-index: 2; }
        #target:active { transform: scale(0.85) rotate(5deg); }
        
        .tabs { display: flex; gap: 5px; overflow-x: auto; padding: 10px 0; scrollbar-width: none; }
        .tab-btn { background: #222; border: none; color: #777; padding: 8px 16px; border-radius: 12px; font-size: 0.8rem; white-space: nowrap; transition: 0.2s; }
        .tab-btn.active { background: var(--acc); color: #000; font-weight: bold; }
        
        .page { display: none; animation: fadeIn 0.3s; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #222; }
        .buy-btn { background: #2e7d32; border: none; color: white; padding: 8px 12px; border-radius: 8px; font-weight: bold; font-size: 0.75rem; }
        .buy-btn:disabled { background: #333; color: #666; }

        .floating-text { position: absolute; pointer-events: none; color: var(--acc); font-weight: bold; animation: floatUp 0.8s ease-out forwards; z-index: 10; }
        @keyframes floatUp { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(-100px); } }
    </style>
</head>
<body>

<div id="reg-screen" style="display:none; text-align:center; padding: 50px 20px;">
    <h1 style="color:var(--acc); font-size: 3rem;">B-COIN</h1>
    <p>Начни свой путь с нуля</p>
    <input type="text" id="username" placeholder="Кличка" style="width: 80%; padding: 15px; border-radius: 12px; border: 1px solid #333; background: #1a1a1a; color: #fff; margin-bottom: 20px;">
    <button onclick="initGame()" style="width: 85%; padding: 15px; background: var(--acc); border: none; border-radius: 12px; font-weight: bold; font-size: 1.1rem;">ВОЙТИ В ИСТОРИЮ</button>
</div>

<div id="game-screen" style="display:none;">
    <div class="card">
        <div style="display: flex; justify-content: space-between; font-size: 0.6rem; color: #888;">
            <span id="rank-name">СТАТУС: БОМЖ</span>
            <span id="lv-txt">УРОВЕНЬ: 1</span>
        </div>
        <div id="balance">0.00 B</div>
        <div class="stats-row">
            <div>⚡ Энергия: <span id="en-n">100</span>% <div class="bar-container"><div id="en-b" class="bar-fill" style="background: #4caf50;"></div></div></div>
            <div>🍔 Еда: <span id="fd-n">100</span>% <div class="bar-container"><div id="fd-b" class="bar-fill" style="background: #2196f3;"></div></div></div>
        </div>
    </div>

    <div class="main-btn-area" id="tap-zone">
        <div id="target">🗑️</div>
    </div>

    <div id="log" style="text-align: center; font-size: 0.8rem; color: var(--acc); height: 20px; margin: 5px 0;"></div>

    <div class="tabs">
        <button class="tab-btn active" onclick="showPage('shop')">🛠 Магазин</button>
        <button class="tab-btn" onclick="showPage('biz')">💼 Бизнес</button>
        <button class="tab-btn" onclick="showPage('luck')">🎰 Удача</button>
        <button class="tab-btn" onclick="showPage('inv')">🎒 Сумка</button>
    </div>

    <div id="shop" class="page active">
        <div class="list-item"><div>🧼 Мыло<br><small>+0.2 за клик</small></div><button class="buy-btn" onclick="buy('pwr', 25)">25 B</button></div>
        <div class="list-item"><div>🍕 Объедки<br><small>Еда +50%</small></div><button class="buy-btn" onclick="buy('food', 15)">15 B</button></div>
        <div class="list-item"><div>🧥 Куртка<br><small>Макс. энергия +50</small></div><button class="buy-btn" onclick="buy('cap', 100)">100 B</button></div>
    </div>

    <div id="biz" class="page">
        <div class="list-item"><div>📦 Сбор картона<br><small>+0.5 B / сек</small></div><button class="buy-btn" onclick="buy('auto1', 200)">200 B</button></div>
        <div class="list-item"><div>🧼 Мойка фар<br><small>+2.5 B / сек</small></div><button class="buy-btn" onclick="buy('auto2', 1000)">1000 B</button></div>
    </div>

    <div id="luck" class="page">
        <div class="card" style="text-align: center;">
            <h3>Наперстки</h3>
            <p>Рискни 50 B-Coins ради джекпота</p>
            <button class="buy-btn" style="background: #d32f2f; padding: 15px 30px;" onclick="gamble()">КРУТИТЬ</button>
        </div>
    </div>

    <div id="inv" class="page">
        <div id="inv-list" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <p style="color:#555; text-align: center; grid-column: 1/3;">Сумка пуста...</p>
        </div>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready(); tg.expand();

    let s = JSON.parse(localStorage.getItem('b_tycoon_v1')) || null;

    const LOCS = [
        {m:0, i:'🗑️', n:'ПОМОЙКА', c:'#0a0a0a'},
        {m:1000, i:'🛋️', n:'ПАРК', c:'#0d1b0d'},
        {m:10000, i:'🚇', n:'МЕТРО', c:'#1b1b1b'},
        {m:50000, i:'🏪', n:'РЫНОК', c:'#2a1a0a'}
    ];

    function initGame() {
        const name = document.getElementById('username').value;
        if(name) {
            s = { name, b:0, en:100, mEn:100, fd:100, pwr:0.1, auto:0, xp:0, lv:1, inv:[], ts: Date.now() };
            save(); start();
        }
    }

    if(s) { calcOff(); start(); } else { document.getElementById('reg-screen').style.display='block'; }

    function start() {
        document.getElementById('reg-screen').style.display='none';
        document.getElementById('game-screen').style.display='block';
        update();
        setInterval(tick, 5000);
    }

    function tick() {
        if(!s) return;
        if(s.auto > 0) s.b += s.auto * 5; 
        s.en = Math.min(s.mEn, s.en + 2);
        s.fd = Math.max(0, s.fd - 0.4);
        update(); save();
    }

    function calcOff() {
        const diff = Math.floor((Date.now() - s.ts) / 5000);
        if(diff > 0) {
            s.en = Math.min(s.mEn, s.en + (diff * 2));
            if(s.auto) s.b += (diff * s.auto * 5);
            s.fd = Math.max(0, s.fd - (diff * 0.4));
        }
    }

    document.getElementById('tap-zone').addEventListener('click', (e) => {
        if(s.en >= 1 && s.fd > 0) {
            let gain = s.pwr;
            let crit = Math.random() < 0.03;
            if(crit) gain *= 5;

            s.b += gain; s.en -= 1; s.fd -= 0.1; s.xp += 1;
            
            if(s.xp >= s.lv * 100) { s.lv++; s.mEn += 10; tg.HapticFeedback.notificationOccurred('success'); }
            
            showFloat(e, (crit ? "🔥 x5 " : "+") + gain.toFixed(1));
            tg.HapticFeedback.impactOccurred('light');
            
            // Механика полиции (1% шанс)
            if(Math.random() < 0.01 && s.b > 100) {
                let fine = s.b * 0.1;
                s.b -= fine;
                log("👮 Копы! Штраф: " + fine.toFixed(0));
            }

            update(); save();
        }
    });

    function buy(type, price) {
        if(s.b >= price) {
            s.b -= price;
            if(type === 'pwr') s.pwr += 0.2;
            if(type === 'food') s.fd = Math.min(100, s.fd + 50);
            if(type === 'cap') s.mEn += 50;
            if(type === 'auto1') s.auto += 0.1;
            if(type === 'auto2') s.auto += 0.5;
            tg.HapticFeedback.notificationOccurred('success');
            update(); save();
        }
    }

    function gamble() {
        if(s.b >= 50) {
            s.b -= 50;
            if(Math.random() > 0.66) { s.b += 200; log("💰 ДЖЕКПОТ! +200 B"); }
            else { log("💨 Пусто..."); }
            update(); save();
        }
    }

    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.target.classList.add('active');
    }

    function showFloat(e, txt) {
        const el = document.createElement('div');
        el.className = 'floating-text';
        el.innerText = txt;
        el.style.left = e.pageX + 'px';
        el.style.top = e.pageY + 'px';
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 800);
    }

    function log(m) { document.getElementById('log').innerText = m; setTimeout(()=>document.getElementById('log').innerText="", 3000); }

    function update() {
        document.getElementById('balance').innerText = s.b.toFixed(2) + " B";
        document.getElementById('en-n').innerText = s.en;
        document.getElementById('en-b').style.width = (s.en / s.mEn * 100) + "%";
        document.getElementById('fd-n').innerText = Math.floor(s.fd);
        document.getElementById('fd-b').style.width = s.fd + "%";
        document.getElementById('lv-txt').innerText = "УРОВЕНЬ: " + s.lv;

        LOCS.forEach(l => {
            if(s.b >= l.m) {
                document.getElementById('target').innerText = l.i;
                document.getElementById('rank-name').innerText = "ЛОКАЦИЯ: " + l.n;
                document.body.style.background = l.c;
            }
        });
    }

    function save() { s.ts = Date.now(); localStorage.setItem('b_tycoon_v1', JSON.stringify(s)); }
</script>
</body>
</html>
