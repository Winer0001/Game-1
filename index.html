<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Crypto Clicker</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background: radial-gradient(circle, #1e1e2f 0%, #000000 100%);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: sans-serif;
            overflow: hidden;
            touch-action: manipulation;
        }
        #score { font-size: 4rem; margin-bottom: 20px; color: #f1c40f; text-shadow: 0 0 20px rgba(241, 196, 15, 0.5); }
        #coin {
            width: 220px;
            height: 220px;
            background: linear-gradient(145deg, #f1c40f, #d35400);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 6rem;
            cursor: pointer;
            box-shadow: 0 0 60px rgba(243, 156, 18, 0.6);
            transition: transform 0.05s active;
            user-select: none;
        }
        #coin:active { transform: scale(0.92); }
    </style>
</head>
<body>
    <div id="score">0</div>
    <div id="coin">🪙</div>

    <script>
        const tg = window.Telegram.WebApp;
        let score = 0;
        const scoreElement = document.getElementById('score');
        const coin = document.getElementById('coin');

        // Инициализация WebApp
        tg.ready();
        tg.expand(); // Развернуть на весь экран

        coin.addEventListener('click', () => {
            score++;
            scoreElement.innerText = score;
            
            // Легкая вибрация при клике
            if (tg.HapticFeedback) {
                tg.HapticFeedback.impactOccurred('light');
            }
        });
    </script>
</body>
</html>
