<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>B-COIN: CARDS EDITION</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { 
            --acc: #ff9800; 
            --bg: #0b0b0e;
            /* Цвета редкости */
            --common: #8e8e8e;
            --rare: #2196f3;
            --epic: #9c27b0;
            --legendary: #ffeb3b;
        }
        
        body { 
            background: var(--bg); color: #fff; font-family: 'Inter', sans-serif;
            margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column;
            overflow: hidden; user-select: none;
        }

        /* Шапка */
        .header { 
            padding: 15px; background: rgba(20, 20, 25, 0.9); 
            backdrop-filter: blur(10px); border-bottom: 1px solid #333;
            text-align: center;
        }
        #balance { font-size: 2.5rem; font-weight: 900; color: var(--acc); margin: 5px 0; }
        .stats { display: flex; justify-content: space-around; font-size: 0.7rem; color: #888; }

        /* Зона клика (меньше, чтобы хватило места карточкам) */
        .game-zone { height: 140px; display: flex; align-items: center; justify-content: center; position: relative; }
        #target { font-size: 5rem; transition: 0.1s; cursor: pointer; }
        #target:active { transform: scale(0.8); }

        /* Табы */
        .tabs { display: flex; padding: 10px; gap: 8px; background: #16161a; overflow-x: auto; }
        .t-btn { 
            background: #25252b; border: 1px solid #333; color: #888; 
            padding: 8px 15px; border-radius: 12px; font-size: 0.8rem; white-space: nowrap;
        }
        .t-btn.active { background: var(--acc); color: #000; font-weight: bold; }

        /* Сетка карточек */
        .content-area { 
            flex-grow: 1; overflow-y: auto; padding: 12px;
            display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
            background: #0b0b0e; padding-bottom: 100px;
        }

        /* Сама КАРТОЧКА */
        .card {
            background: #1c1c22; border-radius: 16px; padding: 12px;
            display: flex; flex-direction: column; align-items: center;
            text-align: center; border: 1px solid #333;
            position: relative; transition: 0.2s;
        }
        .card:active { transform: scale(0.95); }
        
        /* Рамки редкости */
        .card.common { border-top: 4px solid var(--common); }
        .card.rare { border-top: 4px solid var(--rare); box-shadow: 0 0 10px rgba(33, 150, 243, 0.2); }
        .card.epic { border-top: 4px solid var(--epic); box-shadow: 0 0 15px rgba(156, 39, 176, 0.3); }
        .card.legendary { border-top: 4px solid var(--legendary); box-shadow: 0 0 20px rgba(255, 235, 59, 0.4); }

        .card-img { font-size: 2.5rem; margin-bottom: 8px; }
        .card-title { font-size: 0.85rem; font-weight: bold; margin-bottom: 4px; height: 34px; overflow: hidden; }
        .card-profit { font-size: 0.7rem; color: #4caf50; margin-bottom: 10px; }
        .card-lvl { position: absolute; top: 5px; right: 10px; font-size: 0.6rem; color: #666; }
        
        .card-price {
            width: 100%; padding: 8px 0; background: #2d2d35;
            border-radius: 10px; font-weight: bold; font-size: 0.8rem;
            display: flex; align-items: center; justify-content: center; gap: 4px;
        }
        .card.can-buy .card-price { background: #388e3c; color: #fff; }
        .card.locked { opacity: 0.5; filter: grayscale(1); }

        /* FX */
        #fx-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; }
        .fly-num { position: absolute; color: #fff; font-weight: 900; animation: fly 0.7s forwards; }
        @keyframes fly { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-100px); } }
    </style>
</head>
<body>

<div id="fx-layer"></div>

<div class="header">
    <div id="balance">0.00</div>
    <div class="stats">
        <span>⚡ Энергия: <span id="en-v">100</span></span>
        <span>🍔 Еда: <span id="fd-v">100</span>%</span>
    </div>
</div>

<div class="game-zone">
    <div id="target">🗑️</div>
</div>

<div class="tabs">
    <button class="t-btn active" onclick="showTab('mining')">Майнинг</button>
    <button class="t-btn" onclick="showTab('market')">Рынок</button>
    <button class="t-btn" onclick="showTab('specials')">Спец</button>
</div>

<div id="mining" class="content-area"></div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready(); tg.expand();

    let s = JSON.parse(localStorage.getItem('b_cards_v1')) || {
        b: 0, en: 100, fd: 100, pwr: 1, auto: 0,
        upgrades: {
            'u1': 0, 'u2': 0, 'u3': 0, 'u4': 0, 'u5': 0, 'u6': 0
        }
    };

    // БАЗА КАРТОЧЕК
    const DATABASE = [
        { id: 'u1', n: 'Рваный тапок', i: '👟', baseP: 15, baseG: 0.2, rare: 'common', tab: 'mining' },
        { id: 'u2', n: 'Палка-копалка', i: '🦯', baseP: 100, baseG: 1.5, rare: 'rare', tab: 'mining' },
        { id: 'u3', n: 'Мешок сокровищ', i: '💰', baseP: 500, baseG: 8.0, rare: 'epic', tab: 'mining' },
        { id: 'u4', n: 'Склад картона', i: '📦', baseP: 2000, baseG: 25.0, rare: 'legendary', tab: 'mining' },
        { id: 'u5', n: 'Шаурма 24/7', i: '🌯', baseP: 50, baseG: 0, type: 'food', rare: 'common', tab: 'market' },
        { id: 'u6', n: 'Бизнес-Джет', i: '✈️', baseP: 50000, baseG: 500.0, rare: 'legendary', tab: 'specials' }
    ];

    function render() {
        const container = document.getElementById('mining');
        container.innerHTML = '';
        
        DATABASE.forEach(item => {
            const lvl = s.upgrades[item.id] || 0;
            const price = Math.floor(item.baseP * Math.pow(1.5, lvl));
            const canBuy = s.b >= price;
            
            const card = document.createElement('div');
            card.className = `card ${item.rare} ${canBuy ? 'can-buy' : ''}`;
            card.onclick = () => buy(item.id, price);
            
            card.innerHTML = `
                <div class="card-lvl">lvl ${lvl}</div>
                <div class="card-img">${item.i}</div>
                <div class="card-title">${item.n}</div>
                <div class="card-profit">+${item.baseG} /сек</div>
                <div class="card-price">🪙 ${price}</div>
            `;
            container.appendChild(card);
        });
    }

    function buy(id, price) {
        if (s.b >= price) {
            s.b -= price;
            s.upgrades[id] = (s.upgrades[id] || 0) + 1;
            
            const item = DATABASE.find(x => x.id === id);
            if(item.baseG > 0) s.auto += item.baseG;
            if(item.type === 'food') s.fd = 100;

            tg.HapticFeedback.notificationOccurred('success');
            render();
            updateUI();
        }
    }

    document.getElementById('target').addEventListener('click', (e) => {
        if (s.en > 0) {
            s.b += s.pwr;
            s.en -= 1;
            spawnFx(e, `+${s.pwr}`);
            updateUI();
            tg.HapticFeedback.impactOccurred('light');
        }
    });

    function spawnFx(e, t) {
        const f = document.createElement('div');
        f.className = 'fly-num'; f.innerText = t;
        f.style.left = e.pageX + 'px'; f.style.top = e.pageY + 'px';
        document.getElementById('fx-layer').appendChild(f);
        setTimeout(() => f.remove(), 700);
    }

    function updateUI() {
        document.getElementById('balance').innerText = s.b.toFixed(2);
        document.getElementById('en-v').innerText = Math.floor(s.en);
        document.getElementById('fd-v').innerText = Math.floor(s.fd);
        localStorage.setItem('b_cards_v1', JSON.stringify(s));
    }

    setInterval(() => {
        s.b += s.auto / 10;
        if(s.en < 100) s.en += 0.5;
        updateUI();
        // Перерисовываем карточки, чтобы обновить цвета кнопок (можно купить или нет)
        render(); 
    }, 1000);

    render();
    updateUI();
</script>
</body>
</html>
