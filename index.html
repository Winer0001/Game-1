<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>B-COIN: ULTIMATE TYCOON</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { 
            --acc: #ff9800; 
            --bg-top: #1a1a2e; 
            --bg-bottom: #08080c; 
            --card: rgba(255, 255, 255, 0.05); 
            --txt: #ffffff; 
            --brd: rgba(255, 255, 255, 0.1);
        }
        
        body { 
            background: linear-gradient(135deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
            background-attachment: fixed;
            color: var(--txt); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0; padding: 0; 
            height: 100vh; display: flex; flex-direction: column;
            overflow: hidden; user-select: none; touch-action: manipulation;
        }

        /* Фиксированная шапка */
        .header { 
            padding: 15px; 
            background: rgba(0, 0, 0, 0.2); 
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            z-index: 10; 
            border-bottom: 1px solid var(--brd); 
        }

        .hud { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
        .stat-card { 
            background: var(--card); border: 1px solid var(--brd); 
            padding: 8px; border-radius: 12px; font-size: 0.7rem; 
        }
        .val { font-weight: 800; color: var(--acc); font-size: 1rem; }
        
        #balance-container { text-align: center; padding: 5px 0; }
        #balance { font-size: 3rem; font-weight: 900; text-shadow: 0 0 20px rgba(255,152,0,0.3); color: #fff; }

        /* Зона клика */
        .game-zone { 
            flex-shrink: 0; height: 180px; 
            display: flex; align-items: center; justify-content: center; 
            position: relative;
        }
        #target { font-size: 7.5rem; cursor: pointer; transition: 0.1s; z-index: 5; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5)); }
        #target:active { transform: scale(0.8); }

        /* Табы */
        .tabs { 
            display: flex; gap: 8px; padding: 12px; 
            background: rgba(0,0,0,0.1); border-top: 1px solid var(--brd);
            overflow-x: auto; scrollbar-width: none;
        }
        .t-btn { 
            background: rgba(255,255,255,0.05); border: 1px solid var(--brd); 
            color: #aaa; padding: 10px 18px; border-radius: 25px; 
            font-size: 0.8rem; font-weight: 600; white-space: nowrap; 
        }
        .t-btn.active { 
            background: var(--acc); color: #000; border-color: transparent; 
            box-shadow: 0 4px 15px rgba(255,152,0,0.4);
        }

        /* Скролл-зона контента */
        .content-area { 
            flex-grow: 1; overflow-y: auto; padding: 15px;
            background: rgba(0,0,0,0.05); -webkit-overflow-scrolling: touch;
        }
        .page { display: none; padding-bottom: 40px; }
        .page.active { display: block; }

        /* Карточки */
        .upgrade-card { 
            background: var(--card); backdrop-filter: blur(10px);
            padding: 15px; margin-bottom: 12px; border-radius: 16px; 
            display: flex; justify-content: space-between; align-items: center; 
            border: 1px solid var(--brd);
        }
        .info strong { display: block; font-size: 1rem; margin-bottom: 3px; }
        .info small { color: #888; font-size: 0.75rem; }
        .price { color: var(--acc); font-weight: bold; margin-top: 5px; font-size: 0.9rem; }
        
        .buy-btn { 
            background: linear-gradient(135deg, #43a047, #2e7d32); 
            color: #fff; border: none; padding: 12px 16px; 
            border-radius: 12px; font-weight: bold; font-size: 0.8rem;
        }
        .buy-btn:disabled { background: #222; color: #555; }

        /* FX */
        #fx-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; }
        .floating-num { position: absolute; font-weight: 900; color: var(--acc); animation: fly 0.8s forwards; font-size: 1.2rem; }
        @keyframes fly { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-120px); } }
    </style>
</head>
<body>

<div id="fx-layer"></div>

<div id="game-ui" style="display: flex; flex-direction: column; height: 100vh;">
    <div class="header">
        <div class="hud">
            <div class="stat-card">⚡ ЭНЕРГИЯ: <span id="en-v" class="val">100</span></div>
            <div class="stat-card">🍔 СЫТОСТЬ: <span id="fd-v" class="val">100</span>%</div>
        </div>
        <div id="balance-container">
            <div id="balance">0.0</div>
            <div id="passive-info" style="font-size: 0.8rem; color: #4caf50; opacity: 0.8;">+0.0 B/сек</div>
        </div>
    </div>

    <div class="game-zone">
        <div id="target">🗑️</div>
    </div>

    <div class="tabs">
        <button class="t-btn active" onclick="tab('market')">🛒 МАГАЗИН</button>
        <button class="t-btn" onclick="tab('jobs')">💼 БИЗНЕС</button>
        <button class="t-btn" onclick="tab('casino')">🎰 УДАЧА</button>
    </div>

    <div class="content-area">
        <div id="market" class="page active"></div>
        <div id="jobs" class="page">
            <div class="upgrade-card">
                <div class="info"><strong>Сбор картона</strong><small>+1.0 B/сек (офлайн)</small><div class="price">250 B</div></div>
                <button class="buy-btn" id="job1" onclick="buyAuto(250, 1, 'job1')">НАНЯТЬ</button>
            </div>
            <div class="upgrade-card">
                <div class="info"><strong>Мойка окон</strong><small>+5.0 B/сек (офлайн)</small><div class="price">1200 B</div></div>
                <button class="buy-btn" id="job2" onclick="buyAuto(1200, 5, 'job2')">НАНЯТЬ</button>
            </div>
        </div>
        <div id="casino" class="page">
            <div class="upgrade-card">
                <div class="info"><strong>Наперстки</strong><small>Риск 100 B (Шанс x3)</small></div>
                <button class="buy-btn" onclick="gamble(100)">ИГРАТЬ</button>
            </div>
        </div>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready(); tg.expand();

    let s = JSON.parse(localStorage.getItem('b_god_v3')) || {
        b:0, en:100, mEn:100, fd:100, pwr:1, auto:0, ts: Date.now()
    };

    const ITEMS = [
        {id:'i1', n:'Перчатки', d:'+0.5 к силе клика', p:30, s:1.5},
        {id:'i2', n:'Старый Магнит', d:'+1.5 к силе клика', p:150, s:1.6},
        {id:'i3', n:'Хот-дог', d:'Восполнить еду', p:20, s:1.1},
        {id:'i4', n:'Энергетик', d:'Восполнить силы', p:40, s:1.2},
        {id:'i5', n:'Рюкзак', d:'+50 макс. энергии', p:1000, s:2.0}
    ];

    function init() {
        renderShop(); update();
        setInterval(loop, 1000);
        let diff = Math.floor((Date.now() - s.ts)/1000);
        if(diff > 5) {
            s.b += (s.auto * diff);
            s.en = Math.min(s.mEn, s.en + Math.floor(diff/15));
            s.fd = Math.max(0, s.fd - (diff/60));
        }
    }

    function loop() {
        if(s.auto > 0) s.b += s.auto;
        if(s.en < s.mEn) s.en = Math.min(s.mEn, s.en + 0.2);
        s.fd = Math.max(0, s.fd - 0.05);
        update(); save();
    }

    document.getElementById('target').addEventListener('click', (e) => {
        if(s.en >= 1 && s.fd > 0) {
            s.b += s.pwr; s.en -= 0.8; s.fd -= 0.1;
            spawnFx(e, "+" + s.pwr.toFixed(1));
            tg.HapticFeedback.impactOccurred('light');
            update();
        }
    });

    function renderShop() {
        let h = '';
        ITEMS.forEach(i => {
            h += `<div class="upgrade-card">
                <div class="info"><strong>${i.n}</strong><small>${i.d}</small><div class="price">${Math.floor(i.p)} B</div></div>
                <button class="buy-btn" id="btn-${i.id}" onclick="buyItem('${i.id}')">КУПИТЬ</button>
            </div>`;
        });
        document.getElementById('market').innerHTML = h;
    }

    function buyItem(id) {
        let i = ITEMS.find(x => x.id === id);
        if(s.b >= i.p) {
            s.b -= i.p;
            if(id === 'i1') s.pwr += 0.5;
            if(id === 'i2') s.pwr += 1.5;
            if(id === 'i3') s.fd = 100;
            if(id === 'i4') s.en = s.mEn;
            if(id === 'i5') s.mEn += 50;
            i.p *= i.s;
            renderShop(); update();
        }
    }

    function buyAuto(p, v, id) {
        if(s.b >= p) { s.b -= p; s.auto += v; update(); }
    }

    function gamble(a) {
        if(s.b >= a) {
            s.b -= a;
            if(Math.random() > 0.7) { s.b += a*3; tg.HapticFeedback.notificationOccurred('success'); }
            update();
        }
    }

    function tab(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.t-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.target.classList.add('active');
    }

    function spawnFx(e, t) {
        let f = document.createElement('div');
        f.className = 'floating-num'; f.innerText = t;
        f.style.left = e.pageX + 'px'; f.style.top = e.pageY + 'px';
        document.getElementById('fx-layer').appendChild(f);
        setTimeout(()=>f.remove(), 800);
    }

    function update() {
        document.getElementById('balance').innerText = s.b.toFixed(1);
        document.getElementById('en-v').innerText = Math.floor(s.en);
        document.getElementById('fd-v').innerText = Math.floor(s.fd);
        document.getElementById('passive-info').innerText = `+${s.auto.toFixed(1)} B/сек`;
        ITEMS.forEach(i => {
            let b = document.getElementById('btn-'+i.id);
            if(b) b.disabled = s.b < i.p;
        });
        if(s.b > 2000) document.getElementById('target').innerText = "🛋️";
        if(s.b > 20000) document.getElementById('target').innerText = "🏢";
    }

    function save() { s.ts = Date.now(); localStorage.setItem('b_god_v3', JSON.stringify(s)); }
    init();
</script>
</body>
</html>
