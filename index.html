<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFT Marketplace</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #0e0e0e; color: white; font-family: 'Segoe UI', sans-serif; padding: 20px; text-align: center; }
        .header { margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .nft-card { background: #1c1c1e; border-radius: 12px; padding: 10px; border: 1px solid #333; }
        .nft-card img { width: 100%; border-radius: 8px; margin-bottom: 10px; }
        .rarity-Common { color: #8e8e93; }
        .rarity-Rare { color: #007aff; }
        .rarity-Legendary { color: #ff9500; font-weight: bold; text-shadow: 0 0 5px gold; }
        .btn-action { background: #34c759; color: white; border: none; padding: 8px 15px; border-radius: 8px; width: 100%; margin-top: 10px; cursor: pointer; }
        .btn-sell { background: #ff3b30; }
    </style>
</head>
<body>
    <div class="header">
        <h2>Твоя Коллекция 🎒</h2>
    </div>
    
    <div id="nft-container" class="grid">
        <p>Загрузка коллекции...</p>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        // Функция "Выставить на продажу"
        function sellItem(nftId) {
            const price = prompt("Введите цену продажи в Stars:");
            if (price && !isNaN(price)) {
                // Отправляем данные боту: действие_id_цена
                tg.sendData(`sell_${nftId}_${price}`);
                tg.close();
            }
        }

        // Для теста: если бы мы передавали данные при открытии (в реальном проекте нужен API)
        // Пока мы просто показываем интерфейс.
    </script>
</body>
</html>
