<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Clicker</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background: radial-gradient(circle, #1e1e2f 0%, #000000 100%);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            user-select: none;
        }
        #score { font-size: 3rem; margin-bottom: 20px; font-weight: bold; color: #f39c12; }
        #coin {
            width: 200px;
            height: 200px;
            background: linear-gradient(145deg, #f1c40f, #d35400);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 5rem;
            cursor: pointer;
            box-shadow: 0 0 50px rgba(243, 156, 18, 0.5);
            transition: transform 0.1s;
        }
        #coin:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <div id="score">0</div>
    <div id="coin">🪙</div>

    <script>
        let score = 0;
        const scoreElement = document.getElementById('score');
        const coin = document.getElementById('coin');

        coin.addEventListener('click', () => {
            score++;
            scoreElement.innerText = score;
            // Вибрация (только на телефонах в ТГ)
            Telegram.WebApp.HapticFeedback.impactOccurred('medium');
        });

        // Сообщаем Телеграму, что приложение готово
        Telegram.WebApp.ready();
        Telegram.WebApp.expand(); // Развернуть на весь экран
    </script>
</body>
</html>
