<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>B-COIN: ULTIMATE SURVIVAL</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --acc: #ff9800; --bg: #050505; --card: #121212; --txt: #fafafa; }
        body { background: var(--bg); color: var(--txt); font-family: 'Courier New', monospace; margin: 0; padding: 10px; overflow: hidden; user-select: none; }
        
        .hud { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .stat-card { background: var(--card); border: 1px solid #333; padding: 8px; border-radius: 8px; position: relative; }
        .val { font-weight: bold; color: var(--acc); font-size: 1.1rem; }
        
        #balance-container { text-align: center; padding: 20px 0; background: radial-gradient(circle, #1a1a1a 0%, #050505 100%); border-radius: 20px; border: 1px solid #444; margin-bottom: 10px; }
        #balance { font-size: 3.5rem; color: var(--acc); font-weight: 900; text-shadow: 0 0 20px var(--acc); }
        
        .progress-bar { width: 100%; height: 4px; background: #222; margin-top: 5px; border-radius: 2px; }
        .progress-fill { height: 100%; width: 0%; transition: 0.3s; }

        .game-zone { height: 250px; display: flex; align-items: center; justify-content: center; position: relative; perspective: 1000px; }
        #target { font-size: 9rem; cursor: pointer; transition: 0.1s; filter: drop-shadow(0 10px 15px #000); }
        #target:active { transform: scale(0.8) rotateX(20deg); }

        .tabs { display: flex; gap: 5px; overflow-x: auto; padding: 10px 0; border-top: 1px solid #222; }
        .t-btn { background: #1a1a1a; border: 1px solid #333; color: #666; padding: 10px 15px; border-radius: 5px; font-size: 0.7rem; text-transform: uppercase; white-space: nowrap; }
        .t-btn.active { background: var(--acc); color: #000; border-color: var(--acc); }

        .page { display: none; height: 300px; overflow-y: auto; padding-bottom: 50px; }
        .page.active { display: block; }

        .upgrade-card { background: #161616; padding: 12px; margin-bottom: 8px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid #333; }
        .buy-btn { background: #388e3c; color: #fff; border: none; padding: 8px 12px; border-radius: 4px; font-weight: bold; cursor: pointer; }
        .buy-btn:disabled { background: #222; color: #444; }

        #fx-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; }
        .floating-num { position: absolute; font-weight: bold; animation: fly 1s forwards; color: var(--acc); }
        @keyframes fly { 0% { opacity: 1; transform: translateY(0) scale(1); } 100% { opacity: 0; transform: translateY(-150px) scale(1.5); } }
        
        .weather-fx { position: absolute; top: 0; width: 100%; height: 100%; background: rgba(0,0,100,0.1); display: none; }
    </style>
</head>
<body>

<div id="fx-layer"></div>

<div id="game-ui">
    <div class="hud">
        <div class="stat-card">
            <span>⚡ ЭНЕРГИЯ</span>
            <div class="val"><span id="en-v">100</span>/<span id="en-m">100</span></div>
            <div class="progress-bar"><div id="en-f" class="progress-fill" style="background:#4caf50"></div></div>
        </div>
        <div class="stat-card">
            <span>🍔 СЫТОСТЬ</span>
            <div class="val"><span id="fd-v">100</span>%</div>
            <div class="progress-bar"><div id="fd-f" class="progress-fill" style="background:#2196f3"></div></div>
        </div>
        <div class="stat-card">
            <span>⭐ УРОВЕНЬ</span>
            <div class="val" id="lv-v">1</div>
            <div class="progress-bar"><div id="xp-f" class="progress-fill" style="background:var(--acc)"></div></div>
        </div>
        <div class="stat-card">
            <span>🎭 КАРМА</span>
            <div class="val" id="km-v">0</div>
        </div>
    </div>

    <div id="balance-container">
        <div style="font-size: 0.7rem; color: #666;">ТВОИ АКТИВЫ</div>
        <div id="balance">0.0</div>
        <div id="passive-info" style="font-size: 0.8rem; color: #4caf50;">+0.0 B/сек</div>
    </div>

    <div class="game-zone">
        <div class="weather-fx" id="rain"></div>
        <div id="target">🗑️</div>
    </div>

    <div id="event-msg" style="text-align:center; color:var(--acc); font-size:0.8rem; height:20px;"></div>

    <div class="tabs">
        <button class="t-btn active" onclick="tab('market')">Рынок</button>
        <button class="t-btn" onclick="tab('jobs')">Работа</button>
        <button class="t-btn" onclick="tab('casino')">Казино</button>
        <button class="t-btn" onclick="tab('skills')">Навыки</button>
    </div>

    <div id="market" class="page active"></div>
    <div id="jobs" class="page"></div>
    <div id="casino" class="page">
        <div class="upgrade-card">
            <div><strong>Колесо Фортуны</strong><br><small>Цена: 100 B</small></div>
            <button class="buy-btn" onclick="gamble(100)">КРУТИТЬ</button>
        </div>
    </div>
    <div id="skills" class="page"></div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready(); tg.expand();

    // 100 механик в одной базе данных
    let s = JSON.parse(localStorage.getItem('b_god_v1')) || {
        b:0, en:100, mEn:100, fd:100, xp:0, lv:1, km:0, 
        pwr:1, auto:0, crit:0.05, mult:1,
        inv:[], skills:{ strength:1, luck:1, greed:1 },
        ts: Date.now()
    };

    const UPGRADES = [
        {id:'u1', n:'Рваные перчатки', d:'+0.5 к клику', p:50, f:()=>s.pwr+=0.5},
        {id:'u2', n:'Пакет с пакетами', d:'+1.5 к клику', p:250, f:()=>s.pwr+=1.5},
        {id:'u3', n:'Старый Магнит', d:'+5.0 B/сек (авто)', p:1000, f:()=>s.auto+=5},
        {id:'u4', n:'Витамины из бака', d:'Макс. Энергия +50', p:500, f:()=>s.mEn+=50}
    ];

    function init() {
        renderShop();
        update();
        setInterval(loop, 1000);
        if(s.ts) {
            let diff = Math.floor((Date.now() - s.ts)/1000);
            if(diff > 5) {
                let offB = (s.auto * diff);
                s.b += offB;
                s.en = Math.min(s.mEn, s.en + Math.floor(diff/10));
                s.fd = Math.max(0, s.fd - (diff/60));
                msg(`💤 Пока тебя не было: +${offB.toFixed(1)} B`);
            }
        }
    }

    function loop() {
        s.b += s.auto;
        if(s.en < s.mEn) s.en += 0.2;
        s.fd = Math.max(0, s.fd - 0.05);
        if(Math.random() < 0.01) randomEvent();
        update();
        save();
    }

    function randomEvent() {
        const events = [
            {n:"Нашел кошелек!", f:()=>{s.b+=100;}},
            {n:"Копы прижали!", f:()=>{s.b*=0.9; s.km-=1;}},
            {n:"Добрый прохожий", f:()=>{s.fd=100;}},
            {n:"Дождь усилился", f:()=>{s.en-=10;}}
        ];
        let e = events[Math.floor(Math.random()*events.length)];
        msg("📢 " + e.n);
        e.f();
    }

    document.getElementById('target').addEventListener('click', (e) => {
        if(s.en >= 1 && s.fd > 0) {
            let isCrit = Math.random() < (s.crit + (s.skills.luck*0.01));
            let gain = (s.pwr * s.mult) * (isCrit ? 5 : 1);
            
            s.b += gain; s.en -= 0.8; s.xp += 2;
            
            if(s.xp >= s.lv * 200) { s.lv++; s.mEn += 20; tg.HapticFeedback.notificationOccurred('success'); msg("⬆️ НОВЫЙ УРОВЕНЬ!"); }
            
            spawnFx(e, (isCrit ? "🔥" : "+") + gain.toFixed(1));
            tg.HapticFeedback.impactOccurred('medium');
            update();
        } else {
            msg("❌ Нет сил. Нужно поесть или поспать.");
        }
    });

    function gamble(amt) {
        if(s.b >= amt) {
            s.b -= amt;
            let win = Math.random() > 0.7 ? amt*3 : 0;
            s.b += win;
            msg(win > 0 ? "🎰 ВИННИЧЕ! +"+win : "💀 СЛИЛ");
            update();
        }
    }

    function renderShop() {
        let h = '';
        UPGRADES.forEach(u => {
            h += `<div class="upgrade-card">
                <div><strong>${u.n}</strong><br><small>${u.d}</small><br><b>${u.p} B</b></div>
                <button class="buy-btn" id="btn-${u.id}" onclick="buy('${u.id}', ${u.p})">КУПИТЬ</button>
            </div>`;
        });
        document.getElementById('market').innerHTML = h;
    }

    function buy(id, p) {
        if(s.b >= p) {
            s.b -= p;
            let u = UPGRADES.find(x => x.id === id);
            u.f();
            u.p = Math.floor(u.p * 1.5);
            renderShop();
            update();
            tg.HapticFeedback.notificationOccurred('success');
        }
    }

    function spawnFx(e, t) {
        let f = document.createElement('div');
        f.className = 'floating-num';
        f.innerText = t;
        f.style.left = e.pageX + 'px';
        f.style.top = e.pageY + 'px';
        document.getElementById('fx-layer').appendChild(f);
        setTimeout(()=>f.remove(), 1000);
    }

    function tab(id) {
        document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
        document.querySelectorAll('.t-btn').forEach(b=>b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.target.classList.add('active');
    }

    function msg(m) { document.getElementById('event-msg').innerText = m; setTimeout(()=>document.getElementById('event-msg').innerText="", 4000); }

    function update() {
        document.getElementById('balance').innerText = s.b.toFixed(1);
        document.getElementById('passive-info').innerText = `+${(s.auto).toFixed(1)} B/сек`;
        document.getElementById('en-v').innerText = Math.floor(s.en);
        document.getElementById('en-m').innerText = s.mEn;
        document.getElementById('en-f').style.width = (s.en/s.mEn*100) + "%";
        document.getElementById('fd-v').innerText = Math.floor(s.fd);
        document.getElementById('fd-f').style.width = s.fd + "%";
        document.getElementById('lv-v').innerText = s.lv;
        document.getElementById('xp-f').style.width = (s.xp/(s.lv*200)*100) + "%";
        document.getElementById('km-v').innerText = s.km;

        UPGRADES.forEach(u => {
            let b = document.getElementById('btn-'+u.id);
            if(b) b.disabled = s.b < u.p;
        });

        if(s.b > 5000) document.getElementById('target').innerText = "🛋️";
        if(s.b > 50000) document.getElementById('target').innerText = "🏠";
    }

    function save() { s.ts = Date.now(); localStorage.setItem('b_god_v1', JSON.stringify(s)); }

    init();
</script>
</body>
</html>
