<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>B-Coin Tycoon</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #121212; color: #e0e0e0; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; margin: 0; padding: 15px; touch-action: manipulation; }
        #reg-screen, #game-screen { width: 100%; max-width: 400px; display: none; text-align: center; }
        
        /* Статистика */
        .header { background: #1e1e1e; padding: 15px; border-radius: 15px; border: 1px solid #333; margin-bottom: 15px; position: sticky; top: 0; z-index: 10; }
        #balance { font-size: 2.5rem; color: #ff9800; font-weight: bold; }
        .energy-container { width: 100%; height: 8px; background: #333; border-radius: 4px; margin: 8px 0; overflow: hidden; }
        #energy-bar { width: 100%; height: 100%; background: #4caf50; transition: 0.3s; }

        /* Кликер */
        #trash-can { font-size: 8rem; cursor: pointer; transition: 0.1s; margin: 20px 0; user-select: none; }
        #trash-can:active { transform: scale(0.9); }

        /* Магазин */
        .shop-container { background: #1e1e1e; border-radius: 15px; padding: 15px; width: 100%; box-sizing: border-box; border: 1px solid #333; }
        .shop-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #333; }
        .shop-item:last-child { border: 0; }
        .buy-btn { background: #2e7d32; color: white; border: none; padding: 8px 12px; border-radius: 6px; font-weight: bold; font-size: 0.8rem; }
        .buy-btn:disabled { background: #333; color: #777; }

        input { padding: 15px; border-radius: 10px; border: 1px solid #333; background: #222; color: #fff; width: 80%; margin-bottom: 10px; }
        .btn-start { background: #ff9800; color: #000; padding: 15px 40px; border: none; border-radius: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="reg-screen">
        <h1>B-COIN MINER</h1>
        <input type="text" id="fname" placeholder="Твоё Имя">
        <input type="text" id="lname" placeholder="Твоя Фамилия">
        <button class="btn-start" onclick="register()">ПОГНАЛИ</button>
    </div>

    <div id="game-screen" style="display: block;">
        <div class="header">
            <div id="status" style="color: #ff9800; font-size: 0.8rem; text-transform: uppercase;">Статус: Бомж в коробке</div>
            <div id="balance">0.0 B-Coins</div>
            <div style="font-size: 0.7rem;">Энергия: <span id="energy-text">100</span> / <span id="max-energy">100</span></div>
            <div class="energy-container"><div id="energy-bar"></div></div>
        </div>

        <div id="trash-can">🗑️</div>
        
        <div class="shop-container">
            <h3>Улучшения</h3>
            <div class="shop-item">
                <div><strong>🧤 Перчатки</strong><br><small>+0.1 за клик</small></div>
                <button class="buy-btn" id="buy-gloves" onclick="buy('gloves', 15)">15 B</button>
            </div>
            <div class="shop-item">
                <div><strong>📦 Коробка XL</strong><br><small>+50 макс. энергии</small></div>
                <button class="buy-btn" id="buy-box" onclick="buy('box', 50)">50 B</button>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        let state = JSON.parse(localStorage.getItem('b_coin_v2')) || null;

        if (state) showGame(); else document.getElementById('reg-screen').style.display = 'block';

        function register() {
            const f = document.getElementById('fname').value;
            const l = document.getElementById('lname').value;
            if (f && l) {
                state = { 
                    fname: f, balance: 0, energy: 100, 
                    maxEnergy: 100, clickPower: 0.1, 
                    hasGloves: false, hasBox: false 
                };
                save(); showGame();
            }
        }

        function showGame() {
            document.getElementById('reg-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'block';
            updateUI();
        }

        document.getElementById('trash-can').addEventListener('click', () => {
            if (state.energy >= 1) {
                state.balance += state.clickPower;
                state.energy -= 1;
                tg.HapticFeedback.impactOccurred('light');
                updateUI(); save();
            }
        });

        function buy(item, price) {
            if (state.balance >= price) {
                state.balance -= price;
                if (item === 'gloves') { state.clickPower += 0.1; state.hasGloves = true; }
                if (item === 'box') { state.maxEnergy += 50; state.energy = state.maxEnergy; state.hasBox = true; }
                tg.HapticFeedback.notificationOccurred('success');
                updateUI(); save();
            }
        }

        setInterval(() => {
            if (state && state.energy < state.maxEnergy) {
                state.energy = Math.min(state.maxEnergy, state.energy + 1);
                updateUI();
            }
        }, 3000);

        function updateUI() {
            document.getElementById('balance').innerText = state.balance.toFixed(1) + " B";
            document.getElementById('energy-text').innerText = state.energy;
            document.getElementById('max-energy').innerText = state.maxEnergy;
            document.getElementById('energy-bar').style.width = (state.energy / state.maxEnergy * 100) + "%";
            
            document.getElementById('buy-gloves').disabled = state.balance < 15;
            document.getElementById('buy-box').disabled = state.balance < 50;
            
            if (state.balance > 100) document.getElementById('status').innerText = "Статус: Опытный копатель";
        }

        function save() { localStorage.setItem('b_coin_v2', JSON.stringify(state)); }
    </script>
</body>
</html>
