<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>B-Coin Miner</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #121212; color: #eee; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; margin: 0; padding: 15px; touch-action: manipulation; }
        #reg-screen, #game-screen { width: 100%; max-width: 400px; display: none; text-align: center; }
        
        /* Статистика */
        .header { background: #1e1e1e; padding: 15px; border-radius: 15px; border: 1px solid #333; margin-bottom: 15px; width: 100%; box-sizing: border-box; }
        #balance { font-size: 2.5rem; color: #ff9800; font-weight: bold; margin: 5px 0; }
        .energy-container { width: 100%; height: 8px; background: #333; border-radius: 4px; margin: 10px 0; overflow: hidden; }
        #energy-bar { width: 100%; height: 100%; background: #4caf50; transition: 0.3s; }

        /* Кликер */
        #trash-can { font-size: 7rem; cursor: pointer; transition: 0.1s; margin: 15px 0; user-select: none; }
        #trash-can:active { transform: scale(0.9); }

        /* Магазин */
        .shop { background: #1e1e1e; border-radius: 15px; padding: 15px; width: 100%; box-sizing: border-box; border: 1px solid #444; }
        .item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #333; }
        .item:last-child { border: 0; }
        .buy-btn { background: #2e7d32; color: white; border: none; padding: 10px 15px; border-radius: 8px; font-weight: bold; }
        .buy-btn:disabled { background: #333; color: #666; }

        input { padding: 15px; border-radius: 10px; border: 1px solid #333; background: #222; color: #fff; width: 90%; margin-bottom: 15px; font-size: 1rem; }
        .btn-start { background: #ff9800; color: #000; padding: 15px 40px; border: none; border-radius: 10px; font-weight: bold; width: 100%; }
    </style>
</head>
<body>

    <div id="reg-screen">
        <h1 style="color: #ff9800;">B-COIN</h1>
        <p>Назовись, бродяга:</p>
        <input type="text" id="fname" placeholder="Имя">
        <input type="text" id="lname" placeholder="Фамилия">
        <button class="btn-start" onclick="register()">НАЧАТЬ ПУТЬ</button>
    </div>

    <div id="game-screen">
        <div class="header">
            <div id="status" style="color: #ff9800; font-size: 0.8rem; font-weight: bold;">БОМЖ В КОРОБКЕ</div>
            <div id="balance">0.0 B</div>
            <div style="font-size: 0.7rem; color: #888;">Энергия: <span id="en-curr">100</span> / <span id="en-max">100</span></div>
            <div class="energy-container"><div id="energy-bar"></div></div>
        </div>

        <div id="trash-can">🗑️</div>

        <div class="shop">
            <h3 style="margin-top: 0; font-size: 1rem; color: #888;">УЛУЧШЕНИЯ</h3>
            <div class="item">
                <div style="text-align: left;"><strong>🧤 Перчатки</strong><br><small>+0.1 B за клик</small></div>
                <button class="buy-btn" id="b1" onclick="buy('p', 15)">15 B</button>
            </div>
            <div class="item">
                <div style="text-align: left;"><strong>📦 Коробка XL</strong><br><small>+50 макс. энергии</small></div>
                <button class="buy-btn" id="b2" onclick="buy('k', 50)">50 B</button>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        let s = JSON.parse(localStorage.getItem('b_coin_save_v3')) || null;

        if (s) showGame(); else document.getElementById('reg-screen').style.display = 'block';

        function register() {
            const f = document.getElementById('fname').value;
            const l = document.getElementById('lname').value;
            if (f && l) {
                s = { f, balance: 0, en: 100, maxEn: 100, power: 0.1 };
                save(); showGame();
            }
        }

        function showGame() {
            document.getElementById('reg-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'block';
            update();
        }

        document.getElementById('trash-can').addEventListener('click', () => {
            if (s.en >= 1) {
                s.balance += s.power;
                s.en -= 1;
                tg.HapticFeedback.impactOccurred('light');
                update(); save();
            }
        });

        function buy(type, price) {
            if (s.balance >= price) {
                s.balance -= price;
                if (type === 'p') s.power += 0.1;
                if (type === 'k') { s.maxEn += 50; s.en = s.maxEn; }
                tg.HapticFeedback.notificationOccurred('success');
                update(); save();
            }
        }

        setInterval(() => {
            if (s && s.en < s.maxEn) {
                s.en = Math.min(s.maxEn, s.en + 1);
                update();
            }
        }, 2000);

        function update() {
            document.getElementById('balance').innerText = s.balance.toFixed(1) + " B";
            document.getElementById('en-curr').innerText = s.en;
            document.getElementById('en-max').innerText = s.maxEn;
            document.getElementById('energy-bar').style.width = (s.en / s.maxEn * 100) + "%";
            document.getElementById('b1').disabled = s.balance < 15;
            document.getElementById('b2').disabled = s.balance < 50;
            if (s.balance > 100) document.getElementById('status').innerText = "ОПЫТНЫЙ КОПАТЕЛЬ";
        }

        function save() { localStorage.setItem('b_coin_save_v3', JSON.stringify(s)); }
    </script>
</body>
</html>
