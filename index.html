<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>B-Coin Clicker</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #121212; color: #e0e0e0; font-family: 'Arial', sans-serif; display: flex; flex-direction: column; align-items: center; margin: 0; padding: 20px; }
        
        /* Экран регистрации */
        #reg-screen { display: flex; flex-direction: column; gap: 15px; width: 100%; max-width: 300px; margin-top: 50px; }
        input { padding: 12px; border-radius: 8px; border: 1px solid #333; background: #222; color: #fff; }
        .btn-start { background: #ff9800; color: #000; padding: 15px; border: none; border-radius: 8px; font-weight: bold; }

        /* Игровой экран */
        #game-screen { display: none; width: 100%; text-align: center; }
        .stats { background: #1e1e1e; padding: 15px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #333; }
        #balance { font-size: 2.5rem; color: #ff9800; font-weight: bold; }
        
        #trash-can {
            font-size: 8rem; cursor: pointer; transition: 0.1s;
            margin: 40px 0; user-select: none;
        }
        #trash-can:active { transform: scale(0.9); }
    </style>
</head>
<body>

    <div id="reg-screen">
        <h2>Регистрация бродяги</h2>
        <input type="text" id="fname" placeholder="Твоё Имя">
        <input type="text" id="lname" placeholder="Твоя Фамилия">
        <button class="btn-start" onclick="register()">Начать путь к богатству</button>
    </div>

    <div id="game-screen">
        <div class="stats">
            <div id="player-name">Загрузка...</div>
            <div id="balance">0 B-Coins</div>
            <div id="status" style="color: #888;">Статус: Копатель в баке</div>
        </div>

        <div id="trash-can">🗑️</div>
        <p>Рыться в мусоре (+0.1 B-Coin)</p>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        let userData = JSON.parse(localStorage.getItem('b_coin_user'));

        if (userData) {
            showGame();
        }

        function register() {
            const f = document.getElementById('fname').value;
            const l = document.getElementById('lname').value;
            if (f && l) {
                userData = { fname: f, lname: l, balance: 0 };
                localStorage.setItem('b_coin_user', JSON.stringify(userData));
                showGame();
            } else {
                alert("Введи имя и фамилию!");
            }
        }

        function showGame() {
            document.getElementById('reg-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'block';
            document.getElementById('player-name').innerText = userData.fname + " " + userData.lname;
            updateBalance();
        }

        document.getElementById('trash-can').addEventListener('click', () => {
            userData.balance += 0.1; // Медленный, мелочный рост
            updateBalance();
            tg.HapticFeedback.impactOccurred('medium');
            localStorage.setItem('b_coin_user', JSON.stringify(userData));
        });

        function updateBalance() {
            document.getElementById('balance').innerText = userData.balance.toFixed(1) + " B-Coins";
        }
    </script>
</body>
</html>
