<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>B-Coin Empire</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #0f0f0f; --acc: #ff9800; --txt: #e0e0e0; }
        body { background: var(--bg); color: var(--txt); font-family: sans-serif; margin: 0; padding: 10px; touch-action: manipulation; user-select: none; }
        .card { background: #1a1a1a; border: 1px solid #333; border-radius: 15px; padding: 15px; margin-bottom: 10px; text-align: center; }
        #balance { font-size: 2.5rem; color: var(--acc); font-weight: bold; margin: 5px 0; }
        .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; font-size: 0.7rem; }
        .bar { width: 100%; height: 6px; background: #333; border-radius: 3px; margin-top: 4px; overflow: hidden; }
        .fill { height: 100%; transition: 0.3s; }
        .main-btn { height: 200px; display: flex; align-items: center; justify-content: center; font-size: 8rem; cursor: pointer; }
        .main-btn:active { transform: scale(0.9); }
        .tabs { display: flex; gap: 8px; margin-bottom: 10px; overflow-x: auto; }
        .t-btn { background: #252525; border: none; color: #888; padding: 10px 15px; border-radius: 20px; font-size: 0.8rem; }
        .t-btn.active { background: var(--acc); color: #000; font-weight: bold; }
        .page { display: none; background: #1a1a1a; border-radius: 15px; padding: 10px; border: 1px solid #333; }
        .page.active { display: block; }
        .item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #222; }
        .buy { background: #4caf50; color: #fff; border: none; padding: 8px 12px; border-radius: 8px; font-weight: bold; }
        .buy:disabled { background: #333; color: #666; }
    </style>
</head>
<body>

    <div id="reg" style="display:none; text-align:center; margin-top:50px;">
        <h1 style="color:var(--acc)">B-COIN</h1>
        <input type="text" id="fn" placeholder="Имя" style="padding:15px; width:80%; border-radius:10px; margin-bottom:10px;">
        <button onclick="register()" style="padding:15px; width:85%; background:var(--acc); border:none; border-radius:10px; font-weight:bold;">НАЧАТЬ</button>
    </div>

    <div id="game" style="display:none;">
        <div class="card">
            <div id="rank" style="color:var(--acc); font-size:0.7rem;">ЭПОХА: ГРЯЗЬ</div>
            <div id="balance">0.0 B</div>
            <div class="stats">
                <div>⚡ Энергия: <span id="en-n">100</span>%<div class="bar"><div id="en-b" class="fill" style="background:#4caf50; width:100%"></div></div></div>
                <div>🍔 Сытость: <span id="fd-n">100</span>%<div class="bar"><div id="fd-b" class="fill" style="background:#2196f3; width:100%"></div></div></div>
            </div>
        </div>

        <div class="main-btn" id="tap">🗑️</div>
        <div id="msg" style="text-align:center; height:20px; font-size:0.8rem; color:#888; margin-bottom:10px;"></div>

        <div class="tabs">
            <button class="t-btn active" onclick="tab('s')">Магазин</button>
            <button class="t-btn" onclick="tab('b')">Бизнес</button>
        </div>

        <div id="s" class="page active">
            <div class="item"><div>🧤 Перчатки<br><small>+0.2 за клик</small></div><button class="buy" id="btn1" onclick="buy('p', 20)">20 B</button></div>
            <div class="item"><div>🍔 Дошик<br><small>Еда 100%</small></div><button class="buy" id="btn2" onclick="buy('f', 10)">10 B</button></div>
        </div>
        <div id="b" class="page">
            <div class="item"><div>📦 Сбор картона<br><small>+1.0 B / 5 сек</small></div><button class="buy" id="btn3" onclick="buy('a', 150)">150 B</button></div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();

        let s = JSON.parse(localStorage.getItem('b_empire_v6')) || null;

        if (s) { calcOff(); show(); } else { document.getElementById('reg').style.display='block'; }

        function calcOff() {
            if (s.ts) {
                const diff = Math.floor((Date.now() - s.ts) / 5000); // интервалы по 5 сек
                if (diff > 0) {
                    s.en = Math.min(100, s.en + (diff * 2));
                    if (s.auto) s.b += (diff * s.auto);
                    s.fd = Math.max(0, s.fd - (diff * 0.5));
                    log("🔋 Восстановлено " + (diff * 2) + "% энергии");
                }
            }
        }

        function register() {
            const f = document.getElementById('fn').value;
            if (f) {
                s = { f, b: 0, en: 100, fd: 100, pwr: 0.1, auto: 0, ts: Date.now() };
                save(); show();
            }
        }

        function show() {
            document.getElementById('reg').style.display='none';
            document.getElementById('game').style.display='block';
            update();
        }

        document.getElementById('tap').addEventListener('click', () => {
            if (s.en >= 1 && s.fd > 0) {
                s.b += (Math.random() < 0.05 ? s.pwr + 5 : s.pwr);
                s.en -= 1; s.fd -= 0.3;
                tg.HapticFeedback.impactOccurred('light');
                update(); save();
            } else { log("❌ Нет сил!"); }
        });

        function buy(t, p) {
            if (s.b >= p) {
                s.b -= p;
                if (t === 'p') s.pwr += 0.2;
                if (t === 'f') s.fd = 100;
                if (t === 'a') s.auto += 1;
                tg.HapticFeedback.notificationOccurred('success');
                update(); save();
            }
        }

        function tab(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.t-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.target.classList.add('active');
        }

        setInterval(() => {
            if (s) {
                if (s.auto) s.b += s.auto;
                if (s.en < 100) s.en = Math.min(100, s.en + 2);
                s.fd = Math.max(0, s.fd - 0.5);
                update(); save();
            }
        }, 5000);

        function log(m) { document.getElementById('msg').innerText = m; setTimeout(()=>document.getElementById('msg').innerText="", 3000); }
        function update() {
            document.getElementById('balance').innerText = s.b.toFixed(1) + " B";
            document.getElementById('en-n').innerText = s.en;
            document.getElementById('en-b').style.width = s.en + "%";
            document.getElementById('fd-n').innerText = Math.floor(s.fd);
            document.getElementById('fd-b').style.width = s.fd + "%";
            document.getElementById('btn1').disabled = s.b < 20;
            document.getElementById('btn2').disabled = s.b < 10;
            document.getElementById('btn3').disabled = s.b < 150;
        }
        function save() { s.ts = Date.now(); localStorage.setItem('b_empire_v6', JSON.stringify(s)); }
    </script>
</body>
</html>
